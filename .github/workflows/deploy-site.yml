name: Deploy Site
on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Write site env file
        run: |
          echo "PAYLOAD_URL=${{ secrets.PAYLOAD_URL }}" > site/.env
          echo "PAYLOAD_API_KEY=${{ secrets.PAYLOAD_API_KEY }}" >> site/.env
      - run: pnpm --filter site build
      - uses: cloudflare/wrangler-action@v3
        with:
          command: pages deploy site/dist --project-name basescape-site
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: npm
